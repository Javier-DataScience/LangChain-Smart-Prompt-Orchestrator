# ==========================================================
# FILE: docker-compose.yml
# ----------------------------------------------------------
# PURPOSE:
# This file orchestrates the Smart Prompt Orchestrator system
# using Docker Compose.
#
# It runs two services:
#
# 1. FastAPI Backend
#    - Handles routing logic
#    - Executes LangChain chains
#    - Loads Hugging Face transformer model
#
# 2. Streamlit Frontend
#    - Provides ChatGPT-like UI
#    - Communicates with FastAPI backend
#
# ARCHITECTURE FLOW:
#
# Streamlit (UI)
#       ↓ HTTP request
# FastAPI (API + Chains + Model)
#       ↓
# Hugging Face Transformers
#
# KEY FEATURE:
# - Shared Hugging Face cache volume to avoid re-downloading models
# - Ensures faster and stable container startup
#
# ==========================================================

services:

  fastapi:

    build:
      context: .
      dockerfile: Dockerfile.fastapi

    container_name: smart-prompt-fastapi

    ports:
      - "8000:8000"

    # IMPORTANT FIX:
    # Share local Hugging Face cache with container
    # This avoids re-downloading the model inside Docker
    volumes:
      - C:/Users/User/.cache/huggingface:/root/.cache/huggingface

    restart: unless-stopped


  streamlit:

    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: smart-prompt-streamlit

    ports:
      - "8501:8501"

    environment:
      # Streamlit frontend calls FastAPI service
      - API_URL=http://fastapi:8000/route

    depends_on:
      - fastapi

    restart: unless-stopped